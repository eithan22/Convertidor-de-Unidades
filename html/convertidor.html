<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/styles.css" />
    <title>Convertidor</title>
  </head>
  <body>
    <main>

      <section class="header">
        <h2 class="titulo">Convertidor</h2>
      </section>


  


      <section class="convertidor">

            <section class="categorias">
         <select class="selet-categoria">
            <option value="km">Longitud</option>
            <option value ="tem">Temperatura</option>
          </select>
      </section>


      <section class="inputs">

         <section class="entrada">
          <input type="number" class="InputEntrada">

          <select class="opcEntrada">
            <option value="km">KM</option>
            <option value ="C">°C</option>
          </select>

        </section>



        <section class="salida">
          <input type="number" class="InputSalida">

          <select class="opcSalida">
            <option value="millas">Millas</option>
            <option value="F">°F</option>
          </select>

        </section>

      </section>





       

      <section class="boton">
        <button class="btnConvert">Convertir</button>
      </section>

      </section>


     
    </main>

    <script src="/js/convertidor.js"></script>
  </body>
</html>
