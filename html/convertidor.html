<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/css/styles.css" />
    <title>Convertidor</title>
  </head>
  <body>
    <main>
      <section class="header">
        <h2 class="titulo">Convertidor</h2>
      </section>

      <section class="convertidor">
        <section class="categorias">
          <select class="selet-categoria">
            <option value="Longitud">Longitud</option>
            <option value="Peso">Peso</option>
            <option value="Temperatura">Temperatura</option>
            <option value="Tiempo">Tiempo</option>
          </select>
        </section>

        <section class="inputs">
          <section class="entrada">
            <input type="number" class="InputEntrada" />

            <select class="opcEntrada"></select>
          </section>

          <section class="salida">
            <input type="number" class="InputSalida" />

            <select class="opcSalida"></select>
          </section>
        </section>

        <section class="boton">
          <button class="btnConvert">Convertir</button>
        </section>
      </section>
    </main>

    <script src="/js/convertidor.js"></script>
  </body>
</html>
